// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
// @generated begin jpush-buildscript-repositories - expo prebuild (DO NOT MODIFY) sync-50c5bf8180eb90743a7140c61483cf0fc6477d06
maven { url 'https://developer.huawei.com/repo/' }
        maven { url 'https://developer.hihonor.com/repo' }
// @generated end jpush-buildscript-repositories
    google()
    mavenCentral()
  }
  dependencies {
// @generated begin jpush-buildscript-classpaths - expo prebuild (DO NOT MODIFY) sync-bdd192184431eaa9b1de39d53f54ea527d345e69
// Huawei AGConnect
        classpath 'com.huawei.agconnect:agcp:1.9.3.302'
// @generated end jpush-buildscript-classpaths
    classpath('com.android.tools.build:gradle:8.13.2')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
// @generated begin jpush-allprojects-repositories - expo prebuild (DO NOT MODIFY) sync-50c5bf8180eb90743a7140c61483cf0fc6477d06
maven { url 'https://developer.huawei.com/repo/' }
        maven { url 'https://developer.hihonor.com/repo' }
// @generated end jpush-allprojects-repositories
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
